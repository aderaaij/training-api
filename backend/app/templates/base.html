<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Training API{% endblock %}</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface-hover: #222;
            --border: #2a2a2a;
            --text: #e0e0e0;
            --text-muted: #888;
            --accent: #4a9eff;
            --green: #4ade80;
            --yellow: #facc15;
            --red: #f87171;
            --orange: #fb923c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }

        header {
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        header .status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        header .status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
        }

        header .status .dot.down { background: var(--red); }

        nav {
            border-bottom: 1px solid var(--border);
            padding: 0 1.5rem;
            display: flex;
            gap: 0;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            border-bottom: 2px solid transparent;
            transition: color 0.15s, border-color 0.15s;
        }

        nav a:hover { color: var(--text); }
        nav a.active { color: var(--text); border-bottom-color: var(--accent); }

        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
        }

        .card h2 {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
        }

        .card .value {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.03em;
        }

        .card .sub {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .card-wide { grid-column: 1 / -1; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th {
            text-align: left;
            font-weight: 500;
            color: var(--text-muted);
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            padding: 0.6rem 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        tr:last-child td { border-bottom: none; }

        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .badge-green { background: rgba(74, 222, 128, 0.15); color: var(--green); }
        .badge-yellow { background: rgba(250, 204, 21, 0.15); color: var(--yellow); }
        .badge-blue { background: rgba(74, 158, 255, 0.15); color: var(--accent); }
        .badge-orange { background: rgba(251, 146, 60, 0.15); color: var(--orange); }
        .badge-red { background: rgba(248, 113, 113, 0.15); color: var(--red); }
        .badge-muted { background: rgba(136, 136, 136, 0.15); color: var(--text-muted); }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 0.5rem;
        }

        .progress-bar .fill {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            transition: width 0.3s;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            padding: 0.4rem 0;
            font-size: 0.85rem;
        }

        .metric-row .label { color: var(--text-muted); }

        .empty { color: var(--text-muted); font-size: 0.85rem; padding: 1rem 0; }

        .key-display {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.8rem;
            background: var(--bg);
            padding: 0.5rem 0.75rem;
            border-radius: 4px;
            border: 1px solid var(--border);
            word-break: break-all;
        }
    </style>
</head>
<body>
    <header>
        <h1>Training API</h1>
        <div class="status">
            <div class="dot {% if not db_ok %}down{% endif %}"></div>
            {{ "Connected" if db_ok else "DB Down" }}
        </div>
    </header>
    <nav>
        <a href="/dashboard" class="{% if active_page == 'overview' %}active{% endif %}">Overview</a>
        <a href="/dashboard/plan" class="{% if active_page == 'plan' %}active{% endif %}">Plan</a>
        <a href="/dashboard/settings" class="{% if active_page == 'settings' %}active{% endif %}">Settings</a>
        <a href="/docs" style="margin-left: auto;">API Docs</a>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
